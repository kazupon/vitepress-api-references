allowBuilds:
  esbuild: true
  sharp: true
autoInstallPeers: false
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
minimumReleaseAgeExclude:
  - '@kazupon/vp-config'
  - '@ox-jsdoc/**'
  - ox-jsdoc
  - '@ox-content/**'
overrides:
  vitepress>vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
