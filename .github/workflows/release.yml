name: Release

# Triggers:
#   - tag push (v*): normal release flow runs npm/jsr publish in parallel,
#     then release-notes on success of both.
#   - workflow_dispatch: fallback recovery. Pick which job to run for an
#     existing tag (npm-publish / release-notes / all).
on:
  push:
    branches-ignore:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      job:
        description: Which job to run
        type: choice
        required: true
        default: all
        options:
          - all
          - npm-publish
          - release-notes
      tag:
        description: Existing tag to release (e.g. v1.2.3)
        type: string
        required: true

env:
  TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions: {}

jobs:
  npm-publish:
    if: >-
      github.event_name == 'push' || (github.event_name == 'workflow_dispatch' &&
        (inputs.job == 'all' || inputs.job == 'npm-publish'))


    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm OIDC trusted publisher

    steps:
      - name: Checkout codes
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.TAG }}
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@b5d848f5a62488f3d3d920f8aa6ac318a60c5f07 # v1.0.0
        with:
          node-version: 22
          cache: true
          run-install: false

      - name: Install npm 11+ (required for OIDC trusted publishing)
        run: npm install -g npm@11

      - name: Install dependencies
        run: vp install --no-frozen-lockfile

      - name: Build
        run: vp build

      - name: Publish to npm
        # OIDC trusted publisher: requires id-token: write, no NPM_TOKEN needed.
        # Provenance is automatically attached via OIDC.
        run: npm publish --provenance --access public --no-git-checks --tag latest

  release-notes:
    needs:
      - npm-publish
    if: >-
      always() && (
        (github.event_name == 'push' &&
          needs.npm-publish.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && inputs.job == 'release-notes') ||
        (github.event_name == 'workflow_dispatch' && inputs.job == 'all' &&
          needs.npm-publish.result == 'success')
      )


    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHub Release creation + CHANGELOG push

    steps:
      - name: Checkout codes
        # zizmor: ignore[artipacked] -- git-auto-commit-action needs persisted credentials to push.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@b5d848f5a62488f3d3d920f8aa6ac318a60c5f07 # v1.0.0
        with:
          node-version: 22
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --no-frozen-lockfile

      - name: Create GitHub Release
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping creation"
          else
            gh release create "$TAG" --generate-notes
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync changelog from GitHub Releases
        run: vp exec gh-changelogen --repo=kazupon/vitepress-api-references --tag="$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changelog
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          branch: main
          file_pattern: CHANGELOG.md
          commit_message: 'chore: generate changelog'
