name: nightly release
on:
  push:
    branches:
      - '**'
    tags:
      - '!**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@b5d848f5a62488f3d3d920f8aa6ac318a60c5f07 # v1.0.0
        with:
          node-version: 22
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --no-frozen-lockfile

      - name: Building
        run: vpr build

      - name: Release with pkg-pr-new
        run: vpx pkg-pr-new publish
